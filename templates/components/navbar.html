{% load static %}
<header
  class="d-flex flex-wrap align-items-center justify-content-center justify-content-md-between py-3 bg-dark"
>
  <div class="col-md-3 mb-2 mb-md-0">
    <a
        href="/"
        class="d-flex align-items-center mb-2 mb-lg-0 ms-2 text-white text-decoration-none rounded"
      >
        <img src="{% static 'images/logo1.png' %}" width="50" height="50" alt="Logo" class="rounded bg-danger m-6">
        <span class="ms-2"><h2>Garja <span class="text-info">Bazzar</span></h2></span>
      </a>
  </div>
        
      <ul class="nav col-12 col-md-auto mb-2 justify-content-center mb-md-0">
        
          <li><a href="{% url 'home' %}" class="nav-link px-2 text-secondary">Home</a></li>
          <li><a href="{% url 'products' %}" class="nav-link px-2 text-white">Products</a></li>
          <li><a href="#" class="nav-link px-2 text-white">Pricing</a></li>
          <li><a href="{% url 'showcart' %}" class="nav-link px-2 text-white">Cart</a></li>
          <li><a href="{% url 'about' %}" class="nav-link px-2 text-white">About</a></li>
        
      </ul>

      <form class="col-12 col-lg-auto mb-3 mb-lg-0 me-lg-3">
        <input
          type="search"
          class="form-control form-control-dark"
          placeholder="Search..."
          aria-label="Search"
        />
      </form>

      <div class="text-end">
        {% if request.user.is_authenticated %}
          <div class="btn-group">
            <button type="button" class="btn btn-dark dropdown-toggle" data-bs-toggle="dropdown" data-bs-display="static" aria-expanded="false">
              {{user.username}}
            </button>
            <ul class="dropdown-menu dropdown-menu-lg-end">
              <li><a href="#" class="dropdown-item" type="button">Profile</a></li>
              <li><a href="#" class="dropdown-item" type="button">My order</a></li>
              <li><a href="{% url 'account_logout' %}" class="dropdown-item" type="button" >Logout</a></li>
            </ul>
          </div>
          {% else %}
        <a href="{% url 'account_signup' %}" class="btn btn-warning">Register</a>
        <a href="{% url 'account_login' %}" class="btn btn-outline-light me-2">Login</a>
        {% endif %}
      </div>
    </div>
  </div>
</header>
